clauses:
- id: week3.doc_id_uuid
  category: identifier
  severity: error
  description: Each extraction record must carry a stable UUID document identifier.
  rule:
    type: field_format
    field: doc_id
    format: uuid
- id: week3.extracted_at_datetime
  category: temporal
  severity: error
  description: Extraction timestamps must be valid UTC date-times for traceability
    and replay.
  rule:
    type: field_format
    field: extracted_at
    format: date-time
- id: week3.fact_id_uuid
  category: identifier
  severity: error
  description: Every extracted fact must expose a UUID fact identifier.
  rule:
    type: field_format
    field: extracted_facts.fact_id
    format: uuid
- id: week3.confidence_unit_scale
  category: quality
  severity: error
  description: Confidence values must stay on the 0.0 to 1.0 unit interval and never
    drift to percentages.
  rule:
    type: numeric_range
    field: extracted_facts.confidence
    minimum: 0.0
    maximum: 1.0
- id: week3.page_ref_positive
  category: provenance
  severity: error
  description: Each extracted fact must point to a positive page number in the source
    document.
  rule:
    type: numeric_range
    field: extracted_facts.page_ref
    minimum: 1
- id: week3.source_excerpt_present
  category: provenance
  severity: error
  description: Facts must preserve a non-empty source excerpt to support audit review.
  rule:
    type: string_length
    field: extracted_facts.source_excerpt
    minimum: 1
- id: week3.source_hash_sha256
  category: integrity
  severity: error
  description: Source hashes must be SHA-256 digests to support immutable provenance
    checks.
  rule:
    type: field_pattern
    field: source_hash
    pattern: ^[0-9a-f]{64}$
- id: week3.extraction_rules_hash_sha256
  category: integrity
  severity: error
  description: Extraction records must pin the exact SHA-256 hash of extraction_rules.yaml
    used at generation time.
  rule:
    type: field_pattern
    field: extraction_rules_hash
    pattern: ^[0-9a-f]{64}$
- id: week3.processing_time_positive
  category: operational
  severity: error
  description: Processing duration must be recorded as a positive millisecond value.
  rule:
    type: numeric_range
    field: processing_time_ms
    minimum: 1
- id: week3.source_path_lineage
  category: lineage
  severity: warn
  description: Source paths should resolve to refinery chunk or extraction artifacts
    rather than arbitrary files.
  rule:
    type: field_pattern
    field: source_path
    pattern: .*/(artifacts/)?week3/.refinery/(extracted|chunks)/.+
- id: week3.token_counts_non_negative
  category: operational
  severity: warn
  description: Recorded token counters must never be negative even for OCR-derived
    runs.
  rule:
    type: multi_field_numeric_range
    fields:
    - token_count.input
    - token_count.output
    minimum: 0
