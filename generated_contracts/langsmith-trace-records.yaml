clauses:
- id: traces.id_uuid
  category: identifier
  severity: error
  description: Every trace record must expose a UUID id.
  rule:
    type: field_format
    field: id
    format: uuid
- id: traces.start_end_temporal_order
  category: temporal
  severity: error
  description: end_time must be strictly after start_time.
  rule:
    type: temporal_order
    left_field: start_time
    right_field: end_time
    operator: <
- id: traces.total_tokens_sum
  category: quality
  severity: error
  description: total_tokens must equal prompt_tokens + completion_tokens.
  rule:
    type: sum_equals
    fields:
    - prompt_tokens
    - completion_tokens
    output_field: total_tokens
    tolerance: 0.0
- id: traces.run_type_enum
