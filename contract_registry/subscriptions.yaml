      - sequence_number
      - payload
      - occurred_at
      - recorded_at
    breaking_fields:
      - field: event_type
        reason: event schema routing and registry lookups break if event type format changes.
      - field: sequence_number
        reason: monotonic consistency checks fail on duplicates or gaps.
      - field: recorded_at
        reason: temporal integrity checks fail when recorded_at is missing or malformed.
    validation_mode: AUDIT
    registered_at: "2026-04-02T15:10:00Z"
    contact: week7-team@local

  - contract_id: langsmith-trace-records
