subscriptions:
  - contract_id: week1-intent-records
    subscriber_id: week2-digital-courtroom
    fields_consumed:
      - code_refs.file
      - code_refs.line_start
      - code_refs.line_end
      - code_refs.symbol
      - intent_id
    breaking_fields:
      - field: code_refs.file
        reason: verdict target mapping fails when source file paths are missing or renamed.
      - field: intent_id
        reason: intent-level traceability joins fail without stable identifiers.
    validation_mode: AUDIT
    registered_at: "2026-04-02T15:10:00Z"
    contact: week2-team@local

  - contract_id: week1-intent-records
    subscriber_id: week7-validation-runner
    fields_consumed:
      - intent_id
      - code_refs.file
      - code_refs.confidence
      - created_at
    breaking_fields:
      - field: code_refs.file
        reason: traceability validation fails if referenced file paths are missing or renamed.
      - field: intent_id
        reason: contract-level identity checks rely on stable intent identifiers.
    validation_mode: AUDIT
    registered_at: "2026-04-04T20:45:00Z"
    contact: week7-team@local

  - contract_id: week2-verdict-records
    subscriber_id: week7-ai-contract-extension
    fields_consumed:
      - verdict_id
      - scores
      - overall_verdict
      - overall_score
      - confidence
      - evaluated_at
    breaking_fields:
      - field: overall_verdict
        reason: output schema violation-rate metric depends on stable PASS|FAIL|WARN enum.
      - field: scores.score
        reason: rubric-level score validation fails if nested score structure changes.
    validation_mode: AUDIT
    registered_at: "2026-04-02T15:10:00Z"
    contact: week7-ai@local

  - contract_id: week2-verdict-records
    subscriber_id: week7-validation-runner
    fields_consumed:
      - overall_verdict
      - scores.score
      - overall_score
      - confidence
      - evaluated_at
    breaking_fields:
      - field: overall_verdict
        reason: verdict contract validation rules require a stable PASS|FAIL|WARN enum.
      - field: scores.score
        reason: score-range and weighted-mean checks fail if nested score shape changes.
    validation_mode: AUDIT
    registered_at: "2026-04-04T20:45:00Z"
    contact: week7-team@local

  - contract_id: week3-document-refinery-extractions
    subscriber_id: week5-ledger
    fields_consumed:
      - doc_id
      - extracted_facts.confidence
      - extracted_facts.entity_refs
      - extracted_at
    breaking_fields:
