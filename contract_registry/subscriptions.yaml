      - run_type
      - start_time
      - end_time
      - total_tokens
      - total_cost
      - session_id
    breaking_fields:
      - field: run_type
        reason: AI trace classification fails if run_type values drift outside allowed enum.
      - field: total_tokens
        reason: statistical drift and usage-risk metrics depend on token totals.
      - field: end_time
        reason: temporal ordering checks require valid end_time >= start_time.
    validation_mode: AUDIT
    registered_at: "2026-04-02T15:10:00Z"
    contact: week7-ai@local
