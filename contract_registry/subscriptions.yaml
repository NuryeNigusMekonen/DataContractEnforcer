      - nodes.metadata.path
      - edges.source
      - edges.target
      - edges.relationship
      - git_commit
    breaking_fields:
      - field: nodes.node_id
        reason: attribution candidate lookup and graph-node matching depend on node IDs.
      - field: edges.source
        reason: blast radius traversal fails if edge source references are removed or renamed.
      - field: edges.target
        reason: downstream impact mapping fails if edge target references are invalid.
    validation_mode: AUDIT
    registered_at: "2026-04-02T15:10:00Z"
    contact: week7-team@local

  - contract_id: week5-event-records
