      - field: doc_id
        reason: extraction history cannot be linked into immutable event streams without stable document ids.
    validation_mode: AUDIT
    registered_at: "2026-04-04T20:45:00Z"
    contact: week5-team@local

  - contract_id: week3-document-refinery-extractions
    subscriber_id: week7-validation-runner
    fields_consumed:
      - doc_id
      - extracted_facts.confidence
      - extracted_facts.entity_refs
      - entities.entity_id
      - processing_time_ms
    breaking_fields:
      - field: extracted_facts.confidence
        reason: confidence range and drift checks fail when values shift from 0.0-1.0 to percentages.
      - field: doc_id
        reason: identity and lineage join checks depend on stable doc ids.
    validation_mode: AUDIT
    registered_at: "2026-04-04T20:45:00Z"
    contact: week7-team@local

  - contract_id: week4-lineage-snapshots
    subscriber_id: week2-digital-courtroom
    fields_consumed:
      - nodes.node_id
      - edges.source
      - edges.target
      - edges.relationship
    breaking_fields:
      - field: nodes.node_id
        reason: forensic cross-referencing of architecture artifacts depends on stable node ids.
      - field: edges.source
        reason: upstream dependency trace checks fail if lineage edge sources are invalid.
      - field: edges.target
        reason: downstream dependency trace checks fail if lineage edge targets are invalid.
    validation_mode: AUDIT
    registered_at: "2026-04-04T20:45:00Z"
    contact: week2-team@local

  - contract_id: week4-lineage-snapshots
